{% if messages %}
<div class="fixed top-20 left-1/2 -translate-x-1/2 z-[9999] w-full max-w-md px-4 flex flex-col gap-2" id="messageContainer">
  {% for message in messages %}
  <div class="glass-strong px-5 py-3.5 rounded-xl border border-[rgba(255,255,255,0.06)] shadow-xl flex items-start gap-3 message-item" role="alert">
    <div class="flex-shrink-0 mt-0.5">
      {% if message.tags == 'error' %}
      <i class="fa fa-exclamation-circle text-[rgba(255,60,80,0.7)]"></i>
      {% elif message.tags == 'success' %}
      <i class="fa fa-check-circle text-[rgba(60,220,120,0.7)]"></i>
      {% elif message.tags == 'warning' %}
      <i class="fa fa-exclamation-triangle text-[rgba(255,200,50,0.7)]"></i>
      {% else %}
      <i class="fa fa-info-circle text-[rgba(80,160,255,0.7)]"></i>
      {% endif %}
    </div>
    <div class="flex-1 text-sm text-[rgba(255,255,255,0.75)]">
      {% if message.level == DEFAULT_MESSAGE_LEVELS.ERROR %}
      <span class="font-semibold text-[rgba(255,60,80,0.8)]">Error:</span>
      {% endif %}
      {{ message }}
    </div>
    <button class="flex-shrink-0 text-[rgba(255,255,255,0.2)] hover:text-[rgba(255,255,255,0.5)] transition cursor-pointer bg-transparent border-0 p-0 text-sm message-close" type="button">&times;</button>
  </div>
  {% endfor %}
</div>

<script>
(function () {
  var container = document.getElementById('messageContainer');
  if (!container) return;

  container.querySelectorAll('.message-item').forEach(function (el) {
    setTimeout(function () {
      el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      el.style.opacity = '0';
      el.style.transform = 'translateY(-10px)';
      setTimeout(function () { el.remove(); }, 500);
    }, 3000);

    el.querySelector('.message-close').addEventListener('click', function () {
      el.style.transition = 'opacity 0.3s ease';
      el.style.opacity = '0';
      setTimeout(function () { el.remove(); }, 300);
    });
  });
})();
</script>
{% endif %}
