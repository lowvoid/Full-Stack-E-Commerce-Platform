{% extends "base.html" %}
{% load i18n %}
{% load static %}

{% block title %}Create Account — Glass Shop{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-180px)] flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">
    <div class="glass-strong p-8 md:p-10 rounded-2xl border border-[rgba(255,255,255,0.06)]">
      <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-full glass flex items-center justify-center mx-auto mb-4">
          <i class="fa fa-user-plus text-white text-xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-white">{% trans "Create Account" %}</h1>
        <p class="text-white text-sm mt-1">{% trans "Join the Glass Shop" %}</p>
      </div>

      <form method="post" action="{% url 'accounts:register' %}" class="space-y-4">
        {% csrf_token %}

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="first_name" class="block text-white text-sm font-medium mb-1.5">{% trans "First Name" %}</label>
            <input type="text" name="first_name" id="first_name" required
              class="w-full px-4 py-3 rounded-xl bg-[rgba(255,255,255,0.04)] border border-[rgba(255,255,255,0.08)] text-white text-sm placeholder-[rgba(255,255,255,0.2)] outline-none transition focus:border-[rgba(255,255,255,0.2)]"
              placeholder="John">
          </div>
          <div>
            <label for="last_name" class="block text-white text-sm font-medium mb-1.5">{% trans "Last Name" %}</label>
            <input type="text" name="last_name" id="last_name" required
              class="w-full px-4 py-3 rounded-xl bg-[rgba(255,255,255,0.04)] border border-[rgba(255,255,255,0.08)] text-white text-sm placeholder-[rgba(255,255,255,0.2)] outline-none transition focus:border-[rgba(255,255,255,0.2)]"
              placeholder="Doe">
          </div>
        </div>

        <div>
          <label for="email" class="block text-white text-sm font-medium mb-1.5">{% trans "Email" %}</label>
          <input type="email" name="email" id="email" required
            class="w-full px-4 py-3 rounded-xl bg-[rgba(255,255,255,0.04)] border border-[rgba(255,255,255,0.08)] text-white text-sm placeholder-[rgba(255,255,255,0.2)] outline-none transition focus:border-[rgba(255,255,255,0.2)]"
            placeholder="you@example.com">
        </div>

        <div>
          <label for="phone_number" class="block text-white text-sm font-medium mb-1.5">{% trans "Phone Number" %}</label>
          <input type="text" name="phone_number" id="phone_number" required
            class="w-full px-4 py-3 rounded-xl bg-[rgba(255,255,255,0.04)] border border-[rgba(255,255,255,0.08)] text-white text-sm placeholder-[rgba(255,255,255,0.2)] outline-none transition focus:border-[rgba(255,255,255,0.2)]"
            placeholder="+1 234 567 890">
        </div>

        <div>
          <label for="country" class="block text-white text-sm font-medium mb-1.5">{% trans "Country" %}</label>
          <select name="country" id="country" required
            class="w-full px-4 py-3 rounded-xl bg-[rgba(255,255,255,0.04)] border border-[rgba(255,255,255,0.08)] text-white text-sm outline-none transition focus:border-[rgba(255,255,255,0.2)]">
            <option value="" disabled selected class="bg-[#08080e]">{% trans "Select your country" %}</option>
            <option value="US" class="bg-[#08080e]">{% trans "United States" %}</option>
            <option value="UK" class="bg-[#08080e]">{% trans "United Kingdom" %}</option>
            <option value="CA" class="bg-[#08080e]">{% trans "Canada" %}</option>
            <option value="AU" class="bg-[#08080e]">{% trans "Australia" %}</option>
            <option value="DE" class="bg-[#08080e]">{% trans "Germany" %}</option>
            <option value="FR" class="bg-[#08080e]">{% trans "France" %}</option>
            <option value="other" class="bg-[#08080e]">{% trans "Other" %}</option>
          </select>
        </div>

        <div>
          <label for="password" class="block text-white text-sm font-medium mb-1.5">{% trans "Password" %}</label>
          <input type="password" name="password" id="password" required
            class="w-full px-4 py-3 rounded-xl bg-[rgba(255,255,255,0.04)] border border-[rgba(255,255,255,0.08)] text-white text-sm placeholder-[rgba(255,255,255,0.2)] outline-none transition focus:border-[rgba(255,255,255,0.2)]"
            placeholder="Min. 8 characters">
        </div> 
        <div>
          <label for="confirm_password" class="block text-white text-sm font-medium mb-1.5">{% trans "Confirm Password" %}</label>
          <input type="password" name="confirm_password" id="confirm_password" required
            class="w-full px-4 py-3 rounded-xl bg-[rgba(255,255,255,0.04)] border border-[rgba(255,255,255,0.08)] text-white text-sm placeholder-[rgba(255,255,255,0.2)] outline-none transition focus:border-[rgba(255,255,255,0.2)]"
            placeholder="Min. 8 characters">
        </div>

        <button type="submit" class="btn-glass btn-glass-primary w-full justify-center py-3">
          <i class="fa fa-user-plus"></i> {% trans "Create Account" %}
        </button>
      </form>

      <div class="mt-6 text-center">
        <span class="text-white text-sm">{% trans "Already have an account?" %}</span>
        <a href="{% url 'accounts:login' %}" class="text-white font-semibold text-sm hover:brightness-75 transition ml-1">
          {% trans "Sign in" %}
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
